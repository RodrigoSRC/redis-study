services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: redis_study
      POSTGRES_PASSWORD: redis_study
      POSTGRES_DB: redis_study
    ports:
      - '5432:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes

  redisinsight:
    image: redislabs/redisinsight:latest
    ports:
      - '5540:5540'

volumes:
  postgres-data:
  redis-data:
